<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEPA v2.1: Particle God</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="proposal-panel" class="proposal-panel hidden"></div>
        <div id="narrative-panel" class="narrative-panel"></div>
        <div id="timeline-container" class="timeline-container">
            <input type="range" id="timeline-slider" min="0" max="0" value="0" class="timeline-slider">
            <div id="timeline-label" class="timeline-label">LIVE</div>
        </div>
        <div id="insight-panel" class="insight-panel"></div>
        <div id="suggestions-panel" class="suggestions-panel"></div>
        <div id="header-controls">
            <button class="btn chaos-btn" onclick="window.triggerSmartChaos()">CHAOS</button>
            <button class="btn" onclick="window.restartSim()">RESTART</button>
            <button class="btn" onclick="window.togglePause()" id="play-pause-btn">PAUSE</button>
        </div>
        
        <div class="panel" style="max-width: 250px;">
            <div class="toggle-grid">
                <div class="sq-toggle" id="syn-grav" onclick="window.toggleLaw('grav')">GRAV</div>
                <div class="sq-toggle" id="syn-life" onclick="window.toggleLaw('life')">BIOL</div>
                <div class="sq-toggle" id="syn-drag" onclick="window.toggleLaw('drag')">DRAG</div>
                <div class="sq-toggle" id="syn-jitter" onclick="window.toggleLaw('jitter')">ENTR</div>
            </div>

            <div class="tabs">
                <div class="tab-link active" onclick="window.openTab(event, 'tab-world')">WORLD</div>
                <div class="tab-link" onclick="window.openTab(event, 'tab-phys')">PHYS</div>
                <div class="tab-link" onclick="window.openTab(event, 'tab-spec')">SPEC</div>
                <div class="tab-link" onclick="window.openTab(event, 'tab-help')">HELP</div>
                <div class="tab-link" onclick="window.openTab(event, 'tab-log')">LOG</div>
            </div>
            
            <div id="tab-world" class="tab-content active">
                <div id="world-sliders"></div>
            </div>
            
            <div id="tab-phys" class="tab-content">
                <div id="phys-sliders"></div>
            </div>
            
            <div id="tab-spec" class="tab-content">
                <div id="species-list" style="margin-bottom: 10px;"></div>
                <button class="btn" onclick="window.addSpecies()" style="width: 100%; margin-bottom: 5px;">+ SPECIES</button>
                <div id="dna-sliders"></div>
            </div>

            <div id="tab-help" class="tab-content">
                <div id="encyclopaedia"></div>
            </div>

            <div id="tab-log" class="tab-content">
                <div id="narrative-log" style="font-size: 8px; line-height: 1.4;"></div>
            </div>
        </div>
    </div>
    <div id="help-panel" class="help-panel hidden"></div>
    <div id="zoom-hud">FPS: <span id="fps">0</span> | P: <span id="p-count">0</span></div>
    <div id="tooltip"></div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
